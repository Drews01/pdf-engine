<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Annotator - Angular Integration Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Simulated Angular App Header */
    .app-header {
      background: #1473E6;
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .app-header h1 {
      font-size: 18px;
      font-weight: 500;
    }
    
    .user-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 14px;
    }
    
    .user-avatar {
      width: 28px;
      height: 28px;
      background: white;
      color: #1473E6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 12px;
    }
    
    /* Toolbar */
    .toolbar {
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 15px;
      border-right: 1px solid #ddd;
      margin-right: 5px;
    }
    
    .toolbar-group:last-child {
      border-right: none;
      margin-left: auto;
    }
    
    .btn {
      padding: 8px 16px;
      border: 1px solid #ddd;
      background: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
    }
    
    .btn:hover {
      background: #f0f0f0;
      border-color: #ccc;
    }
    
    .btn-primary {
      background: #1473E6;
      color: white;
      border-color: #1473E6;
    }
    
    .btn-primary:hover {
      background: #0d62c9;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* User Selector */
    .user-selector {
      padding: 6px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }
    
    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    /* PDF Annotator Iframe */
    #pdfAnnotator {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }
    
    /* Console/Log Panel */
    .console-panel {
      width: 350px;
      background: #1e1e1e;
      color: #d4d4d4;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #333;
    }
    
    .console-header {
      padding: 12px 15px;
      background: #2d2d2d;
      border-bottom: 1px solid #333;
      font-size: 13px;
      font-weight: 500;
    }
    
    .console-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.5;
    }
    
    .console-line {
      margin-bottom: 8px;
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .console-line.info {
      background: rgba(20, 115, 230, 0.2);
      border-left: 3px solid #1473E6;
    }
    
    .console-line.success {
      background: rgba(0, 170, 0, 0.2);
      border-left: 3px solid #00AA00;
    }
    
    .console-line.warn {
      background: rgba(255, 149, 0, 0.2);
      border-left: 3px solid #FF9500;
    }
    
    .console-line.error {
      background: rgba(227, 25, 55, 0.2);
      border-left: 3px solid #E31937;
    }
    
    .timestamp {
      color: #858585;
      font-size: 11px;
    }
    
    /* Status Badge */
    .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-badge.connected {
      background: #d4edda;
      color: #155724;
    }
    
    .status-badge.disconnected {
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <!-- Simulated Angular App Header -->
  <header class="app-header">
    <h1>📄 MyAngularApp - Document Viewer</h1>
    <div class="user-section">
      <span id="connectionStatus" class="status-badge disconnected">Disconnected</span>
      <div id="userInfo" class="user-info" style="display: none;">
        <div class="user-avatar" id="userAvatar">U</div>
        <span id="userName">Unknown User</span>
      </div>
    </div>
  </header>

  <!-- Toolbar (Simulating Angular Component) -->
  <div class="toolbar">
    <div class="toolbar-group">
      <label>Switch User:</label>
      <select id="userSelect" class="user-selector">
        <option value="">-- Select User --</option>
        <option value='{"id":"user1","username":"john_doe","fullName":"John Doe","email":"john@example.com","role":"editor"}'>John Doe (Editor)</option>
        <option value='{"id":"user2","username":"jane_smith","fullName":"Jane Smith","email":"jane@example.com","role":"reviewer"}'>Jane Smith (Reviewer)</option>
        <option value='{"id":"user3","username":"bob_wilson","fullName":"Bob Wilson","email":"bob@example.com","role":"viewer"}'>Bob Wilson (Viewer)</option>
      </select>
      <button id="loginBtn" class="btn">Login</button>
      <button id="logoutBtn" class="btn" disabled>Logout</button>
    </div>
    
    <div class="toolbar-group">
      <button id="getAnnotationsBtn" class="btn" disabled>📋 Get Annotations Data</button>
      <button id="downloadPdfBtn" class="btn btn-primary" disabled>💾 Download PDF</button>
    </div>
  </div>

  <!-- Main Content Area -->
  <div class="main-content">
    <!-- PDF Annotator Iframe -->
    <iframe id="pdfAnnotator" src="index.html"></iframe>
    
    <!-- Console Panel -->
    <div class="console-panel">
      <div class="console-header">Integration Log</div>
      <div class="console-content" id="consoleContent">
        <div class="console-line info">
          <span class="timestamp">[System]</span> Waiting for PDF Annotator to load...
        </div>
      </div>
    </div>
  </div>

  <script>
    // ============================================
    // Angular Integration Demo Script
    // ============================================
    
    const pdfIframe = document.getElementById('pdfAnnotator');
    const userSelect = document.getElementById('userSelect');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const getAnnotationsBtn = document.getElementById('getAnnotationsBtn');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');
    const consoleContent = document.getElementById('consoleContent');
    const userInfo = document.getElementById('userInfo');
    const userName = document.getElementById('userName');
    const userAvatar = document.getElementById('userAvatar');
    const connectionStatus = document.getElementById('connectionStatus');
    
    let currentUser = null;
    let isConnected = false;
    
    // Logger function
    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const line = document.createElement('div');
      line.className = `console-line ${type}`;
      line.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
      consoleContent.appendChild(line);
      consoleContent.scrollTop = consoleContent.scrollHeight;
    }
    
    // Listen for messages from PDF Annotator
    window.addEventListener('message', (event) => {
      // In production, verify event.origin!
      
      const { type, payload, success } = event.data;
      
      switch (type) {
        case 'USER_SET':
          if (success) {
            isConnected = true;
            connectionStatus.textContent = 'Connected';
            connectionStatus.className = 'status-badge connected';
            log('✅ User successfully set in PDF Annotator', 'success');
            updateUI();
          }
          break;
          
        case 'USER_CLEARED':
          if (success) {
            isConnected = false;
            connectionStatus.textContent = 'Disconnected';
            connectionStatus.className = 'status-badge disconnected';
            log('👋 User logged out', 'warn');
            updateUI();
          }
          break;
          
        case 'ANNOTATIONS_DATA':
          log('📋 Received annotation data:', 'success');
          log(`   Total annotations: ${payload.totalAnnotations}`, 'info');
          log(`   Authors: ${payload.authors.map(a => a.username).join(', ') || 'None'}`, 'info');
          log(`   Pages with annotations: ${Object.keys(payload.annotationsByPage).length}`, 'info');
          console.log('Full annotation data:', payload);
          break;
          
        case 'SAVE_COMPLETE':
          log('✅ PDF export complete!', 'success');
          handlePdfDownload(payload);
          break;
          
        case 'SAVE_ERROR':
          log(`❌ PDF export failed: ${payload.error}`, 'error');
          break;
          
        case 'SAVE_PROGRESS':
          log(`📊 Exporting page ${payload.page} of ${payload.total}...`, 'info');
          break;
          
        case 'PDF_ANNOTATOR_ANNOTATION_ADDED':
          const ann = payload.annotation;
          log(`➕ Annotation added by ${ann.author?.username || 'Anonymous'}: ${ann.type}`, 'success');
          break;
          
        case 'PDF_ANNOTATOR_ANNOTATION_REMOVED':
          log('➖ Annotation removed', 'warn');
          break;
      }
    });
    
    // Login button handler
    loginBtn.addEventListener('click', () => {
      const selectedValue = userSelect.value;
      if (!selectedValue) {
        alert('Please select a user first!');
        return;
      }
      
      try {
        currentUser = JSON.parse(selectedValue);
        
        // Send user to PDF annotator
        pdfIframe.contentWindow.postMessage({
          type: 'SET_USER',
          payload: currentUser
        }, '*');
        
        // Update UI
        userName.textContent = currentUser.fullName;
        userAvatar.textContent = currentUser.fullName.charAt(0).toUpperCase();
        userInfo.style.display = 'flex';
        
        log(`🔐 Logging in as ${currentUser.fullName} (${currentUser.role})...`);
        
      } catch (e) {
        log('❌ Error parsing user data', 'error');
      }
    });
    
    // Logout button handler
    logoutBtn.addEventListener('click', () => {
      currentUser = null;
      
      pdfIframe.contentWindow.postMessage({
        type: 'CLEAR_USER'
      }, '*');
      
      userInfo.style.display = 'none';
      userSelect.value = '';
      
      log('🔓 Logging out...');
    });
    
    // Get annotations button handler
    getAnnotationsBtn.addEventListener('click', () => {
      pdfIframe.contentWindow.postMessage({
        type: 'GET_ANNOTATIONS'
      }, '*');
      
      log('📤 Requesting annotation data...');
    });
    
    // Download PDF button handler
    downloadPdfBtn.addEventListener('click', () => {
      pdfIframe.contentWindow.postMessage({
        type: 'SAVE_PDF_REQUEST'
      }, '*');
      
      log('📤 Requesting PDF export...');
    });
    
    // Handle PDF download
    function handlePdfDownload(data) {
      const byteString = atob(data.pdfData.split(',')[1]);
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      
      for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
      }
      
      const blob = new Blob([ab], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      
      const a = document.createElement('a');
      a.href = url;
      a.download = `annotated-document-${new Date().getTime()}.pdf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      
      URL.revokeObjectURL(url);
      
      log('💾 PDF downloaded successfully!', 'success');
      
      // Log metadata
      log(`   Exported by: ${data.metadata.exportedBy?.username || 'Anonymous'}`, 'info');
      log(`   Total annotations: ${data.metadata.totalAnnotations}`, 'info');
    }
    
    // Update UI based on state
    function updateUI() {
      loginBtn.disabled = isConnected;
      logoutBtn.disabled = !isConnected;
      getAnnotationsBtn.disabled = !isConnected;
      downloadPdfBtn.disabled = !isConnected;
      userSelect.disabled = isConnected;
    }
    
    // Initial UI update
    updateUI();
    
    // Log initial state
    log('🚀 Angular Integration Demo loaded');
    log('   1. Select a user from the dropdown');
    log('   2. Click "Login" to authenticate');
    log('   3. Add annotations to the PDF');
    log('   4. Click "Get Annotations Data" to see metadata');
    log('   5. Click "Download PDF" to save with author info');
  </script>
</body>
</html>
