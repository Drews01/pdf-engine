<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF Annotator</title>
  
  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css"/>
  
  <!-- Configure PDF.js -->
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
</head>
<body>
  <!-- Top Bar -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">PDF Annotator</div>
      <div class="divider"></div>
      <div class="filename" id="filename">No file loaded</div>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" id="prevBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15,18 9,12 15,6"></polyline>
        </svg>
      </button>
      <span class="page-info">
        <span id="pageNum">—</span> / <span id="totalPg">—</span>
      </span>
      <button class="btn-icon" id="nextBtn" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9,18 15,12 9,6"></polyline>
        </svg>
      </button>
    </div>
  </header>

  <!-- Main Layout -->
  <div class="main-container">
    <!-- Left Sidebar - Tools -->
    <aside class="toolbar-sidebar" id="toolbarSidebar">
      <div class="tool-group">
        <button class="tool-btn active" data-tool="select" title="Select">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path>
          </svg>
        </button>
        <button class="tool-btn" data-tool="hand" title="Hand Tool">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"></path>
            <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"></path>
            <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"></path>
            <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.01-3.01"></path>
          </svg>
        </button>
      </div>
      
      <div class="tool-divider"></div>
      
      <div class="tool-group">
        <button class="tool-btn" data-tool="text" title="Add Text">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4,7 4,4 20,4 20,7"></polyline>
            <line x1="9" y1="20" x2="15" y2="20"></line>
            <line x1="12" y1="4" x2="12" y2="20"></line>
          </svg>
        </button>
        <button class="tool-btn has-submenu" data-tool="draw" title="Drawing Tools">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
            <path d="M2 2l7.586 7.586"></path>
            <circle cx="11" cy="11" r="2"></circle>
          </svg>
        </button>
        <div class="submenu" id="drawSubmenu">
          <button class="submenu-item active" data-tool="draw">
            <span class="submenu-icon">✏️</span>
            <span>Draw</span>
          </button>
          <button class="submenu-item" data-tool="line">
            <span class="submenu-icon">➖</span>
            <span>Line</span>
          </button>
          <button class="submenu-item" data-tool="arrow">
            <span class="submenu-icon">➡️</span>
            <span>Arrow</span>
          </button>
          <button class="submenu-item" data-tool="rectangle">
            <span class="submenu-icon">⬜</span>
            <span>Rectangle</span>
          </button>
          <button class="submenu-item" data-tool="circle">
            <span class="submenu-icon">⭕</span>
            <span>Circle</span>
          </button>
          <button class="submenu-item" data-tool="highlighter">
            <span class="submenu-icon">🖍️</span>
            <span>Highlighter</span>
          </button>
        </div>
      </div>
      
      <div class="tool-divider"></div>
      
      <div class="tool-group">
        <button class="tool-btn has-submenu" data-tool="stamp" title="Stamps">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 11 3.8 11 8c0 1.25-.97 2.5-1 4.5 0 2.24 1.11 4.13 2.5 4.89V22"></path>
            <path d="M8 22v-2.38c0-2.13-1.03-3.12-1-5.62.03-2.72 1.49-6 4.5-6C14.37 8 16 9.8 16 14c0 1.25-.97 2.5-1 4.5 0 2.24 1.11 4.13 2.5 4.89V22"></path>
          </svg>
        </button>
        <div class="submenu" id="stampSubmenu">
          <button class="submenu-item active" data-stamp="check">
            <span class="submenu-icon">✓</span>
            <span>Checkmark</span>
          </button>
          <button class="submenu-item" data-stamp="cross">
            <span class="submenu-icon">✕</span>
            <span>Crossmark</span>
          </button>
          <button class="submenu-item" data-stamp="dot">
            <span class="submenu-icon">●</span>
            <span>Dot</span>
          </button>
          <button class="submenu-item" data-stamp="circle">
            <span class="submenu-icon">○</span>
            <span>Circle around</span>
          </button>
          <button class="submenu-item" data-stamp="crossout">
            <span class="submenu-icon">—</span>
            <span>Cross out</span>
          </button>
        </div>
      </div>
      
      <div class="tool-divider"></div>
      
      <div class="tool-group">
        <button class="tool-btn" data-tool="delete" title="Delete Selected">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3,6 5,6 21,6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
    </aside>

    <!-- Canvas Area -->
    <main class="canvas-area" id="canvasArea">
      <!-- Upload Overlay -->
      <div class="upload-overlay" id="uploadOverlay">
        <div class="upload-box" id="uploadBox">
          <div class="upload-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14,2 14,8 20,8"></polyline>
              <line x1="12" y1="18" x2="12" y2="12"></line>
              <line x1="9" y1="15" x2="15" y2="15"></line>
            </svg>
          </div>
          <h2>Drop PDF file here</h2>
          <p>or click to browse</p>
          <span class="upload-hint">PDF files only</span>
        </div>
      </div>
      
      <!-- Pages Container -->
      <div class="pages-container" id="pagesContainer"></div>
    </main>

    <!-- Right Sidebar - Annotations -->
    <aside class="annotations-sidebar">
      <div class="annotations-header">
        <span>Annotations</span>
        <span class="annotation-count" id="annotationCount">0</span>
      </div>
      <div class="annotations-list" id="annotationsList">
        <div class="annotations-empty">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
          <p>No annotations yet</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- Properties Toolbar -->
  <div class="properties-bar" id="propertiesBar">
    <div class="property-group">
      <label>Color</label>
      <div class="color-picker">
        <button class="color-btn active" data-color="#E31937" style="background: #E31937;"></button>
        <button class="color-btn" data-color="#000000" style="background: #000000;"></button>
        <button class="color-btn" data-color="#0066CC" style="background: #0066CC;"></button>
        <button class="color-btn" data-color="#00AA00" style="background: #00AA00;"></button>
        <button class="color-btn" data-color="#FF9500" style="background: #FF9500;"></button>
      </div>
    </div>
    <div class="property-group">
      <label>Size</label>
      <select class="size-select" id="sizeSelect">
        <option value="2">Thin</option>
        <option value="4" selected>Medium</option>
        <option value="8">Thick</option>
        <option value="12">Extra Thick</option>
      </select>
    </div>
    <div class="property-group property-group-right">
      <button class="btn-save" id="saveBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17,21 17,13 7,13 7,21"></polyline>
          <polyline points="7,3 7,8 15,8"></polyline>
        </svg>
        Save PDF
      </button>
    </div>
  </div>

  <!-- Text Input Popup -->
  <div class="text-popup" id="textPopup">
    <textarea id="textInput" placeholder="Enter your text..."></textarea>
    <div class="text-popup-actions">
      <button class="btn-cancel" id="textCancel">Cancel</button>
      <button class="btn-confirm" id="textConfirm">Add</button>
    </div>
  </div>

  <!-- Progress Overlay -->
  <div class="progress-overlay" id="progressOverlay">
    <div class="progress-box">
      <div class="progress-spinner"></div>
      <div class="progress-label" id="progressLabel">Processing...</div>
      <div class="progress-sub" id="progressSub"></div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <!-- Hidden File Input -->
  <input type="file" id="fileInput" accept=".pdf" style="display:none"/>

  <!-- Application Scripts -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
